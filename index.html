<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科特画像 · 数据看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0f14;
  --surface: #151820;
  --surface2: #1c2030;
  --border: #252a3a;
  --border-focus: #4f8ef7;
  --accent:  #4f8ef7;
  --accent2: #f7a04f;
  --accent3: #4fcea2;
  --accent4: #f74fa0;
  --purple:  #a04ff7;
  --yellow:  #f7e04f;
  --text: #e2e8f0;
  --text-muted: #7a869a;
  --text-dim: #3d4556;
  --up: #f74fa0;
  --down: #4fcea2;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 300;
  padding: 28px 24px 60px;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 18px;
}
.header-left { display: flex; align-items: baseline; gap: 14px; }
.header h1 { font-size: 20px; font-weight: 500; letter-spacing: 0.04em; }
.header .sub { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

.btn-group { display: flex; gap: 8px; }
.add-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 5px;
  border: 1px solid var(--border-focus);
  background: rgba(79,142,247,0.1);
  color: var(--accent);
  font-size: 12px; font-family: 'DM Mono', monospace;
  cursor: pointer; transition: all 0.2s;
}
.add-btn:hover { background: rgba(79,142,247,0.2); }
.save-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 5px;
  border: 1px solid #4fcea2;
  background: rgba(79,206,162,0.1);
  color: #4fcea2;
  font-size: 12px; font-family: 'DM Mono', monospace;
  cursor: pointer; transition: all 0.2s;
}
.save-btn:hover { background: rgba(79,206,162,0.2); }
.load-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 16px; border-radius: 5px;
  border: 1px solid #f7a04f;
  background: rgba(247,160,79,0.1);
  color: #f7a04f;
  font-size: 12px; font-family: 'DM Mono', monospace;
  cursor: pointer; transition: all 0.2s;
}
.load-btn:hover { background: rgba(247,160,79,0.2); }
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: #1c2030; border: 1px solid #4fcea2; color: #4fcea2;
  font-family: 'DM Mono', monospace; font-size: 12px;
  padding: 10px 22px; border-radius: 6px;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
}
.toast.show { opacity: 1; }

/* ── TABS ── */
.tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab {
  padding: 10px 22px; font-size: 12px; font-family: 'DM Mono', monospace;
  color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── INPUT TABLE ── */
.section-label {
  font-size: 10px; letter-spacing: 0.14em; color: var(--text-dim);
  text-transform: uppercase; margin: 0 0 12px;
  font-family: 'DM Mono', monospace;
}

.input-table-wrap { overflow-x: auto; margin-bottom: 24px; }
.input-table {
  border-collapse: collapse;
  font-size: 12px; font-family: 'DM Mono', monospace;
  min-width: 700px; width: 100%;
}
.input-table th {
  background: var(--surface2); color: var(--text-muted);
  font-weight: 400; padding: 10px 6px; font-size: 10px;
  letter-spacing: 0.08em; border: 1px solid var(--border);
  text-align: center; white-space: nowrap; position: relative;
}
.input-table th.metric-col { text-align: left; padding-left: 12px; min-width: 140px; }
.input-table th .del-col {
  position: absolute; top: 50%; right: 4px; transform: translateY(-50%);
  background: none; border: none; color: var(--text-dim); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 3px;
  transition: color 0.15s;
}
.input-table th .del-col:hover { color: var(--down); }

.input-table td {
  border: 1px solid var(--border);
  padding: 0; background: var(--surface);
}
.input-table td.row-label {
  padding: 9px 12px; color: var(--text-muted); background: var(--surface2);
  font-size: 11px; white-space: nowrap;
}
.input-table td.row-label .unit { color: var(--text-dim); margin-left: 4px; font-size: 10px; }
.input-table td.sep-row {
  background: #0f1117 !important; color: var(--text-dim) !important;
  font-size: 10px; padding: 6px 12px; letter-spacing: 0.1em;
  border-color: var(--border); font-style: italic;
}

.cell-input {
  width: 100%; height: 100%; padding: 9px 8px;
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
  text-align: center; transition: background 0.15s;
}
.cell-input:focus { background: rgba(79,142,247,0.08); color: #fff; }
.cell-input::placeholder { color: var(--text-dim); }
.cell-input.has-val { color: var(--text); }
.cell-input:hover:not(:focus) { background: rgba(255,255,255,0.02); }

/* mom badge inside table */
.mom-cell {
  display: flex; flex-direction: column; align-items: center;
  padding: 4px 8px; gap: 2px;
}
.mom-val { font-size: 12px; color: var(--text); }
.mom-badge {
  font-size: 9px; padding: 1px 5px; border-radius: 2px;
  font-family: 'DM Mono', monospace; white-space: nowrap;
}
.mom-badge.up   { background: rgba(247,79,160,0.15); color: var(--up); }
.mom-badge.down { background: rgba(79,206,162,0.15);  color: var(--down); }
.mom-badge.na   { color: var(--text-dim); }

/* ── DASHBOARD ── */
.kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px 18px; position: relative; overflow: hidden;
}
.kpi-card::after { content:''; position:absolute; top:0;left:0;right:0; height:2px; }
.kpi-card.c0::after { background: var(--accent); }
.kpi-card.c1::after { background: var(--accent2); }
.kpi-card.c2::after { background: var(--accent3); }
.kpi-card.c3::after { background: var(--accent4); }
.kpi-label { font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; letter-spacing: 0.08em; margin-bottom: 6px; }
.kpi-val   { font-size: 22px; font-weight: 500; font-family: 'DM Mono', monospace; }
.kpi-badge { display: inline-flex; align-items: center; gap: 3px; margin-top: 5px; font-size: 11px; font-family: 'DM Mono', monospace; padding: 2px 6px; border-radius: 3px; }
.kpi-badge.up   { background: rgba(247,79,160,0.12); color: var(--up); }
.kpi-badge.down { background: rgba(79,206,162,0.12);  color: var(--down); }
.kpi-badge.na   { background: rgba(122,134,154,0.12); color: var(--text-muted); }
.kpi-prev { font-size: 10px; color: var(--text-dim); margin-top: 3px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.full { grid-column: 1/-1; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
.card-title { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-muted); letter-spacing: 0.1em; margin-bottom: 12px; text-transform: uppercase; }
.chart-wrap    { position: relative; height: 200px; }
.chart-wrap-sm { position: relative; height: 160px; }

.legend { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.legend-bar  { width: 12px; height: 5px; border-radius: 2px; flex-shrink: 0; }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 160px; color: var(--text-dim); font-family: 'DM Mono', monospace; font-size: 12px; gap: 8px;
}
.empty-icon { font-size: 28px; opacity: 0.3; }

/* ── PERIOD SELECTOR ── */
.period-bar { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:5px; overflow:hidden; margin-bottom:20px; width:fit-content; }
.period-btn { padding:7px 16px; border:none; border-right:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:11px; font-family:'DM Mono',monospace; cursor:pointer; transition:all 0.2s; }
.period-btn:last-child { border-right:none; }
.period-btn:hover  { background:rgba(79,142,247,0.06); color:var(--text); }
.period-btn.active { background:rgba(79,142,247,0.14); color:var(--accent); }

#dashTab { display:none; }
#inputTab { display:block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1><span class="dot"></span>科特画像 · 数据看板</h1>
    <span class="sub">填表自动更新</span>
  </div>
  <div class="btn-group">
    <button class="save-btn" id="saveBtn">💾 保存数据</button>
    <button class="load-btn" id="loadBtn">📂 加载数据</button>
    <input type="file" id="fileInput" accept=".json" style="display:none">
    <button class="add-btn" id="addPeriodBtn">＋ 新增期次</button>
  </div>

</div>

<div class="tabs">
  <div class="tab active" data-tab="inputTab">📋 数据录入</div>
  <div class="tab" data-tab="dashTab">📊 可视化看板</div>
</div>

<div id="inputTab">
  <p class="section-label">直接编辑表格 · 看板实时联动</p>
  <div class="input-table-wrap">
    <table class="input-table" id="inputTable"></table>
  </div>
</div>

<div id="dashTab">
  <div id="periodBarWrap"></div>
  <div class="kpi-row" id="kpiRow"></div>
  <div class="grid-2">
    <div class="card">
      <div class="card-title">ADQ 单量 & 环比</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div>单量</div>
        <div class="legend-item"><div class="legend-bar" style="background:rgba(79,206,162,0.4)"></div>环比%</div>
      </div>
      <div class="chart-wrap"><canvas id="adqChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">ADQ 消耗（万）& 环比</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#f7a04f"></div>消耗</div>
        <div class="legend-item"><div class="legend-bar" style="background:rgba(79,206,162,0.4)"></div>环比%</div>
      </div>
      <div class="chart-wrap"><canvas id="consumeChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">女性 & 31-50岁占比</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4fcea2"></div>女性</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f74fa0"></div>31-50岁</div>
      </div>
      <div class="chart-wrap"><canvas id="demoChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">年级 & 城线分布</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#a04ff7"></div>一年级及以下</div>
        <div class="legend-item"><div class="legend-dot" style="background:#f7e04f"></div>1-2线城市</div>
      </div>
      <div class="chart-wrap"><canvas id="gradeChart"></canvas></div>
    </div>
    <div class="card full">
      <div class="card-title">版位分布趋势（公小 / 拓展 / 朋友圈 / PACD）</div>
      <div class="chart-wrap-sm"><canvas id="posChart"></canvas></div>
    </div>
  </div>
</div>

<script>
// ── Data model ───────────────────────────────────────────
const METRICS = [
  { key:'adq',      label:'ADQ 单量',      unit:'',  group:null },
  { key:'consume',  label:'ADQ 消耗',       unit:'万', group:null },
  { key:'wxdou',    label:'微信豆单量',      unit:'',  group:null },
  { key:'female',   label:'女性占比',        unit:'%', group:'用户画像' },
  { key:'age3150',  label:'31-50岁占比',    unit:'%', group:null },
  { key:'grade1',   label:'一年级及以下',    unit:'%', group:null },
  { key:'city12',   label:'1-2线城市',      unit:'%', group:null },
  { key:'pos_pub',  label:'公小版位',        unit:'%', group:'版位分布' },
  { key:'pos_ext',  label:'拓展版位',        unit:'%', group:null },
  { key:'pos_pyq',  label:'朋友圈',          unit:'%', group:null },
  { key:'pos_pacd', label:'PACD',           unit:'%', group:null },
];

// Initial data
let periods = ['春5','春6','春7','春8','春9'];
let tableData = {
  adq:      [1674, 1625, 1816, 2277, 1386],
  consume:  [157.03, 151.51, 160.73, 205.01, 125.68],
  wxdou:    [570, 495, 582, 800, 657],
  female:   [80.05, 80.41, 77.04, 84.41, 78.64],
  age3150:  [67.20, 70.77, 66.63, 72.73, 88.68],
  grade1:   [40.44, 37.64, 36.39, 39.08, 45.72],
  city12:   [58.02, 60.03, 58.16, 54.11, 55.86],
  pos_pub:  [40.56, 50.19, 50.00, 53.00, 46.03],
  pos_ext:  [14.20, 16.75, 18.28, 10.58, 15.95],
  pos_pyq:  [12.66,  8.25,  5.29,  5.80,  8.73],
  pos_pacd: [19.89, 16.80, 16.24, 13.92, 15.01],
};

let selectedPeriod = periods.length - 1;

function mom(arr) {
  return arr.map((v,i) => {
    if (i===0 || v===null || v==='' || arr[i-1]===null || arr[i-1]==='') return null;
    return +((v - arr[i-1]) / arr[i-1] * 100).toFixed(1);
  });
}

// ── Input Table ──────────────────────────────────────────
function buildInputTable() {
  const table = document.getElementById('inputTable');
  let html = '<thead><tr>';
  html += '<th class="metric-col">指标</th>';
  periods.forEach((p, ci) => {
    html += `<th style="min-width:100px">
      ${p}
      ${periods.length > 1 ? `<button class="del-col" data-ci="${ci}" title="删除此期">×</button>` : ''}
    </th>`;
  });
  html += '</tr></thead><tbody>';

  let lastGroup = undefined;
  METRICS.forEach(m => {
    if (m.group !== null && m.group !== lastGroup) {
      lastGroup = m.group;
      html += `<tr><td class="sep-row" colspan="${periods.length + 1}">── ${m.group}</td></tr>`;
    } else if (m.group === null && lastGroup !== undefined && METRICS.find(x=>x.key===m.key) && !m.group) {
      // no separator needed for null groups after a group
    }

    const vals = tableData[m.key];
    const ms   = mom(vals);
    html += `<tr>`;
    html += `<td class="row-label">${m.label}<span class="unit">${m.unit}</span></td>`;
    periods.forEach((_, ci) => {
      const v = vals[ci];
      const mv = ms[ci];
      const momClass = mv===null ? 'na' : mv>0 ? 'up' : 'down';
      const momText  = mv===null ? '基准' : (mv>0?'↑':'↓')+' '+Math.abs(mv)+'%';
      html += `<td>
        <div class="mom-cell">
          <input class="cell-input${v!==null&&v!==''?' has-val':''}" 
                 type="number" step="any"
                 value="${v!==null&&v!==''?v:''}"
                 placeholder="—"
                 data-key="${m.key}" data-ci="${ci}"
          />
          <span class="mom-badge ${momClass}">${momText}</span>
        </div>
      </td>`;
    });
    html += `</tr>`;
  });

  html += '</tbody>';
  table.innerHTML = html;

  // Bind inputs
  table.querySelectorAll('.cell-input').forEach(inp => {
    inp.addEventListener('input', () => {
      const key = inp.dataset.key;
      const ci  = +inp.dataset.ci;
      const val = inp.value === '' ? null : parseFloat(inp.value);
      tableData[key][ci] = val;
      refreshMomBadges();
      updateDashboard();
    });
  });

  // Bind delete column buttons
  table.querySelectorAll('.del-col').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const ci = +btn.dataset.ci;
      deletePeriod(ci);
    });
  });
}

function refreshMomBadges() {
  const table = document.getElementById('inputTable');
  METRICS.forEach(m => {
    const ms = mom(tableData[m.key]);
    periods.forEach((_, ci) => {
      const inp = table.querySelector(`input[data-key="${m.key}"][data-ci="${ci}"]`);
      if (!inp) return;
      const badge = inp.parentElement.querySelector('.mom-badge');
      const mv = ms[ci];
      badge.className = 'mom-badge ' + (mv===null?'na':mv>0?'up':'down');
      badge.textContent = mv===null ? '基准' : (mv>0?'↑':'↓')+' '+Math.abs(mv)+'%';
    });
  });
}

// ── Add / Delete period ──────────────────────────────────
document.getElementById('addPeriodBtn').addEventListener('click', () => {
  const name = prompt('输入新期次名称（如 春10）', '春10');
  if (!name || !name.trim()) return;
  const label = name.trim();
  if (periods.includes(label)) { alert('期次已存在'); return; }
  periods.push(label);
  METRICS.forEach(m => tableData[m.key].push(null));
  selectedPeriod = periods.length - 1;
  buildInputTable();
  updateDashboard();
});

function deletePeriod(ci) {
  if (periods.length <= 1) { alert('至少保留一期'); return; }
  if (!confirm(`确认删除「${periods[ci]}」？`)) return;
  periods.splice(ci, 1);
  METRICS.forEach(m => tableData[m.key].splice(ci, 1));
  if (selectedPeriod >= periods.length) selectedPeriod = periods.length - 1;
  buildInputTable();
  updateDashboard();
}

// ── Charts ───────────────────────────────────────────────
let charts = {};
const TT = { backgroundColor:'#1c2030', borderColor:'#252a3a', borderWidth:1, titleColor:'#7a869a', bodyColor:'#e2e8f0' };

function safeData(arr) {
  return arr.map(v => (v===null||v===''||isNaN(v)) ? null : +v);
}

function initCharts() {
  const ids = ['adqChart','consumeChart','demoChart','gradeChart','posChart'];
  ids.forEach(id => { if (charts[id]) { charts[id].destroy(); } });

  const labels = periods;

  // Combo: line + mom bars
  function mkCombo(id, color, key, yFmt) {
    const vals = safeData(tableData[key]);
    const ms   = mom(vals);
    charts[id] = new Chart(document.getElementById(id), {
      data: { labels, datasets: [
        { type:'line', label:'数值', data:vals, borderColor:color, backgroundColor:color+'14',
          fill:true, tension:0.4, pointRadius:4, pointHoverRadius:6, borderWidth:2,
          pointBackgroundColor:color, yAxisID:'y', spanGaps:true },
        { type:'bar', label:'环比', data:ms,
          backgroundColor: ms.map(v=>v===null?'transparent':v>=0?'rgba(247,79,160,0.3)':'rgba(79,206,162,0.3)'),
          borderColor:      ms.map(v=>v===null?'transparent':v>=0?'#f74fa0':'#4fcea2'),
          borderWidth:1, yAxisID:'y2', barPercentage:0.5 }
      ]},
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{display:false}, tooltip:{ ...TT, callbacks:{ label: ctx=>{
          if(ctx.datasetIndex===0) return ' '+(yFmt?yFmt(ctx.raw):ctx.raw);
          const v=ctx.raw; return v===null?'':' 环比: '+(v>0?'+':'')+v+'%';
        }}}},
        scales:{
          x:{ ticks:{color:'#4a5568',font:{family:'DM Mono',size:11}}, grid:{color:'#1c2030'} },
          y:{ ticks:{color:'#4a5568',font:{family:'DM Mono',size:11}, callback:yFmt||undefined}, grid:{color:'#1c2030'}, position:'left' },
          y2:{ ticks:{color:'#4a5568',font:{family:'DM Mono',size:10}, callback:v=>v===null?'':(v>0?'+':'')+v+'%'}, grid:{display:false}, position:'right' }
        }
      }
    });
  }

  function mkMultiLine(id, datasets) {
    charts[id] = new Chart(document.getElementById(id), {
      type:'line',
      data:{ labels, datasets: datasets.map(d=>({
        ...d, tension:0.4, pointRadius:4, pointHoverRadius:6, borderWidth:2,
        pointBackgroundColor:d.borderColor, fill:false, spanGaps:true
      }))},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{ legend:{display:false}, tooltip:{ ...TT, callbacks:{label:ctx=>' '+ctx.dataset.label+': '+(ctx.raw??'—')+'%'}} },
        scales:{
          x:{ticks:{color:'#4a5568',font:{family:'DM Mono',size:11}},grid:{color:'#1c2030'}},
          y:{ticks:{color:'#4a5568',font:{family:'DM Mono',size:11},callback:v=>v+'%'},grid:{color:'#1c2030'}}
        }
      }
    });
  }

  mkCombo('adqChart',     '#4f8ef7', 'adq');
  mkCombo('consumeChart', '#f7a04f', 'consume', v=>v+'万');
  mkMultiLine('demoChart', [
    {label:'女性',   data:safeData(tableData.female),  borderColor:'#4fcea2'},
    {label:'31-50', data:safeData(tableData.age3150), borderColor:'#f74fa0'},
  ]);
  mkMultiLine('gradeChart', [
    {label:'一年级及以下', data:safeData(tableData.grade1), borderColor:'#a04ff7'},
    {label:'1-2线城市',   data:safeData(tableData.city12), borderColor:'#f7e04f'},
  ]);

  // Stacked bar
  charts['posChart'] = new Chart(document.getElementById('posChart'), {
    type:'bar',
    data:{ labels, datasets:[
      {label:'公小版位', data:safeData(tableData.pos_pub),  backgroundColor:'#4f8ef7', stack:'s'},
      {label:'拓展版位', data:safeData(tableData.pos_ext),  backgroundColor:'#f7a04f', stack:'s'},
      {label:'朋友圈',   data:safeData(tableData.pos_pyq),  backgroundColor:'#4fcea2', stack:'s'},
      {label:'PACD',    data:safeData(tableData.pos_pacd), backgroundColor:'#f74fa0', stack:'s'},
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:true, labels:{color:'#7a869a',boxWidth:9,font:{family:'DM Mono',size:10}}},
        tooltip:{...TT, callbacks:{label:ctx=>' '+ctx.dataset.label+': '+(ctx.raw??'—')+'%'}} },
      scales:{
        x:{ticks:{color:'#4a5568',font:{family:'DM Mono',size:11}},grid:{color:'#1c2030'}},
        y:{ticks:{color:'#4a5568',font:{family:'DM Mono',size:11},callback:v=>v+'%'},grid:{color:'#1c2030'}}
      }
    }
  });
}

// ── KPI Cards ────────────────────────────────────────────
const KPI_DEFS = [
  {key:'adq',    label:'ADQ 单量',  fmt:v=>v!=null?v.toLocaleString():'—', color:'c0'},
  {key:'consume',label:'ADQ 消耗',  fmt:v=>v!=null?v+'万':'—',             color:'c1'},
  {key:'wxdou',  label:'微信豆单量', fmt:v=>v!=null?v.toLocaleString():'—', color:'c2'},
  {key:'female', label:'女性占比',   fmt:v=>v!=null?v+'%':'—',              color:'c3'},
];

function renderKPI(idx) {
  const row = document.getElementById('kpiRow');
  // Build period selector
  const barWrap = document.getElementById('periodBarWrap');
  if (periods.length > 1) {
    let barHtml = '<div class="period-bar" id="periodBar">';
    periods.slice(1).forEach((p, i) => {
      const ri = i + 1;
      barHtml += `<button class="period-btn${ri===idx?' active':''}" data-i="${ri}">${p}</button>`;
    });
    barHtml += '</div>';
    barWrap.innerHTML = barHtml;
    barWrap.querySelector('#periodBar').addEventListener('click', e=>{
      const btn = e.target.closest('.period-btn');
      if(!btn) return;
      barWrap.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedPeriod = +btn.dataset.i;
      renderKPI(selectedPeriod);
    });
  } else {
    barWrap.innerHTML = '';
  }

  row.innerHTML = KPI_DEFS.map(({key,label,fmt,color}) => {
    const cur  = tableData[key][idx];
    const prev = idx > 0 ? tableData[key][idx-1] : null;
    const ms   = mom(tableData[key]);
    const m    = ms[idx];
    const bc   = m===null?'na':m>0?'up':'down';
    const bt   = m===null?'—':(m>0?'↑':'↓')+' '+Math.abs(m)+'%';
    const prevLabel = idx > 0 ? `前期 ${periods[idx-1]}: ${fmt(prev)}` : '基准期';
    return `<div class="kpi-card ${color}">
      <div class="kpi-label">${label} · ${periods[idx]}</div>
      <div class="kpi-val">${fmt(cur)}</div>
      <span class="kpi-badge ${bc}">${bt}</span>
      <div class="kpi-prev">${prevLabel}</div>
    </div>`;
  }).join('');
}

// ── Update everything ────────────────────────────────────
function updateDashboard() {
  if (selectedPeriod >= periods.length) selectedPeriod = periods.length - 1;
  renderKPI(selectedPeriod);
  initCharts();
}

// ── Tabs ─────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    document.getElementById('inputTab').style.display = target==='inputTab' ? 'block' : 'none';
    document.getElementById('dashTab').style.display  = target==='dashTab'  ? 'block' : 'none';
    if (target === 'dashTab') updateDashboard();
  });
});

// ── Save / Load ──────────────────────────────────────────
function showToast(msg, color='#4fcea2') {
  let t = document.querySelector('.toast');
  if (!t) { t = document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.style.borderColor = color;
  t.style.color = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const payload = JSON.stringify({ periods, tableData }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '科特画像数据.json';
  a.click();
  showToast('✓ 数据已保存');
});

document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (!parsed.periods || !parsed.tableData) throw new Error('格式错误');
      periods.length = 0;
      parsed.periods.forEach(p => periods.push(p));
      Object.keys(parsed.tableData).forEach(k => { tableData[k] = parsed.tableData[k]; });
      selectedPeriod = periods.length - 1;
      buildInputTable();
      updateDashboard();
      showToast('✓ 数据加载成功');
    } catch {
      showToast('✗ 文件格式有误', '#f74fa0');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── Init ─────────────────────────────────────────────────
buildInputTable();
</script>
</body>
</html>
